version: "3.9"
 mongodb:
 build:
  context:mongo
 image: ${REPO}/rs-mongodb:${TAG} 
networks:
 roboshop:
  driver:bridge
web:
  image: web:v1
  container_name: web
  depends_on:
  - catalogue
mongodb:
  image: mongodb:v1
  container_name: mongodb
catalogue:
  image: catalogue:v1
  container_name: catalogue
  depends_on:
  - mongodb
redis:
  image:redis
user:
  image: user:v1
  container_name: user
  depends_on:
  - mongodb
  - redis
cart:
 image: cart:v1
 container_name: cart
 depends_on:
 - redis
 - catalogue
 mysql:
  image: mysql:v1
  container_name: mysql
shipping:
 images: shipping:v1
 container_name: shipping
 depends_on:
 - mysql
 rabbitmq:
  image: rabbitmq
  container_name: rabbitmq
 payment:
  image: payments:v1
  container_name: payment
  depends_on: 
  - rabbitmq




